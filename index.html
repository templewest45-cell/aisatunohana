<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>あいさつのはな</title>
    <link rel="icon" type="image/png" href="./assets/app-icon.png?v=20260621-1" />
    <link rel="apple-touch-icon" href="./assets/app-icon.png?v=20260621-1" />
    <link rel="stylesheet" href="./styles.css?v=20260620-13" />
  </head>
  <body>
    <button class="teacher-toggle" id="settingsToggle" type="button" aria-expanded="false" aria-controls="teacherPanel"><ruby>設定<rt>せってい</rt></ruby></button>
    <main class="app">
      <section class="record-panel" id="recordArea" aria-label="記録エリア">
        <header class="hero">
          <p class="kicker">みんなの<ruby>声<rt>こえ</rt></ruby>で<ruby>花<rt>はな</rt></ruby>を<ruby>咲<rt>さ</rt></ruby>かせよう</p>
          <h1 id="appTitle">あいさつのさくら</h1>
          <p class="student-message" id="studentMessage"><ruby>大<rt>おお</rt></ruby>きな<ruby>声<rt>こえ</rt></ruby>であいさつしよう</p>
          <p class="bloom-stage" id="bloomStageLabel">つぼみ</p>
        </header>

        <section class="count-row" aria-label="カウント">
          <div>
            <span><ruby>今日<rt>きょう</rt></ruby>のあいさつ</span>
            <strong><b id="countLabel">0</b><ruby>回<rt>かい</rt></ruby></strong>
          </div>
          <div>
            <span id="bloomCountTitle"><ruby>咲<rt>さ</rt></ruby>いた<ruby>花<rt>はな</rt></ruby></span>
            <strong><b id="flowerLabel">0</b><ruby>個<rt>こ</rt></ruby></strong>
          </div>
          <div>
            <span><ruby>今日<rt>きょう</rt></ruby>の<ruby>目標<rt>もくひょう</rt></ruby></span>
            <strong><b id="goalLabel">50</b><ruby>回<rt>かい</rt></ruby></strong>
          </div>
        </section>

        <section class="tree-stage" aria-label="桜の木">
          <svg id="sakuraSvg" viewBox="0 0 900 620" role="img" aria-label="咲いた花を表示する桜の木">
            <image id="treeImage" href="./assets/storybook-sakura.png" x="0" y="0" width="900" height="620" preserveAspectRatio="xMidYMid slice" />
            <g id="flowersLayer"></g>
            <g id="petalsLayer"></g>
            <g id="fullBloomOverlay" class="full-bloom-overlay" aria-hidden="true">
              <rect x="214" y="42" width="472" height="86" rx="28" />
              <text x="450" y="76">もくひょうたっせい！</text>
              <text x="450" y="112">みんなのあいさつでまんかい！</text>
            </g>
          </svg>
          <button class="aisatsu-mascot" id="highFiveButton" type="button" disabled aria-label="ハイタッチであいさつ">
            <span class="speech-bubble" id="greetingBubble" aria-live="polite">おはよう</span>
            <img id="aisatsuMascot" src="./assets/aisatsu-kun-highfive.png" alt="" />
            <span class="high-five-label">ハイタッチ</span>
          </button>
        </section>

        <section class="inclusive-actions" aria-label="声を出さないあいさつ">
          <p class="high-five-help"><ruby>声<rt>こえ</rt></ruby>・ハイタッチ・みつめて<ruby>参加<rt>さんか</rt></ruby></p>
          <p class="gaze-note" id="gazeNote" hidden>
            みつめて<ruby>参加<rt>さんか</rt></ruby>がオンです
          </p>
        </section>

        <section class="bottom-info" aria-label="活動情報と声量">
          <div class="status-grid">
            <div>
              <span><ruby>日付<rt>ひづけ</rt></ruby></span>
              <strong id="dateLabel">--</strong>
            </div>
            <div>
              <span><ruby>開始<rt>かいし</rt></ruby></span>
              <strong id="startLabel">--:--</strong>
            </div>
            <div>
              <span><ruby>終了<rt>しゅうりょう</rt></ruby></span>
              <strong id="endLabel">--:--</strong>
            </div>
            <div>
              <span><ruby>実施時間<rt>じっしじかん</rt></ruby></span>
              <strong id="durationLabel">--</strong>
            </div>
          </div>

          <div class="session-actions" aria-label="開始と終了">
            <button class="primary" id="startButton" type="button"><ruby>開始<rt>かいし</rt></ruby></button>
            <button id="stopButton" type="button" disabled><ruby>終了<rt>しゅうりょう</rt></ruby></button>
          </div>

          <div class="meter-wrap" aria-label="声量メーター">
            <div class="meter-top">
              <span><ruby>声量<rt>せいりょう</rt></ruby>メーター</span>
              <strong id="volumeLabel">0</strong>
            </div>
            <div class="meter" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="volumeMeter">
              <div id="volumeFill"></div>
              <i id="thresholdMark" aria-hidden="true"></i>
            </div>
          </div>
        </section>
      </section>

      <aside class="controls" id="teacherPanel" aria-label="操作と設定">
        <div class="button-row">
          <button id="saveButton" type="button" disabled><ruby>記録保存<rt>きろくほぞん</rt></ruby></button>
          <button id="testFlowerButton" type="button"><ruby>花<rt>はな</rt></ruby>テスト</button>
        </div>

        <label class="memo-label" for="memoInput">メモ</label>
        <textarea id="memoInput" rows="3" placeholder="活動場所や様子を記録できます"></textarea>

        <details open>
          <summary><ruby>設定<rt>せってい</rt></ruby></summary>
          <div class="settings-grid">
            <label>
              <ruby>花<rt>はな</rt></ruby>の<ruby>種類<rt>しゅるい</rt></ruby>
              <select id="themeSelect">
                <option value="sakura">さくら</option>
                <option value="sunflower">ひまわり</option>
                <option value="momiji">もみじ</option>
                <option value="tsubaki">つばき</option>
              </select>
            </label>
            <label>
              <ruby>保存形式<rt>ほぞんけいしき</rt></ruby>
              <select id="saveFormatSelect">
                <option value="image">画像のみ</option>
                <option value="both">画像＋CSV</option>
              </select>
            </label>
            <label>
              <ruby>声量<rt>せいりょう</rt></ruby>しきい<ruby>値<rt>ち</rt></ruby>
              <input id="thresholdInput" type="range" min="5" max="100" value="25" />
              <output id="thresholdOutput">25</output>
            </label>
            <label>
              <ruby>連続判定時間<rt>れんぞくはんていじかん</rt></ruby>（<ruby>秒<rt>びょう</rt></ruby>）
              <input id="holdInput" type="number" min="0.1" max="2" step="0.1" value="0.2" />
            </label>
            <label>
              <ruby>再検知<rt>さいけんち</rt></ruby>までの<ruby>時間<rt>じかん</rt></ruby>（<ruby>秒<rt>びょう</rt></ruby>）
              <input id="cooldownInput" type="number" min="0.5" max="5" step="0.1" value="2" />
            </label>
            <label>
              <ruby>満開<rt>まんかい</rt></ruby>の<ruby>目標<rt>もくひょう</rt></ruby>
              <input id="maxFlowersInput" type="number" min="10" max="150" step="5" value="50" />
            </label>
            <label class="check-setting">
              <input id="highFiveToggle" type="checkbox" checked />
              ハイタッチで<ruby>参加<rt>さんか</rt></ruby>
            </label>
            <label class="check-setting">
              <input id="gazeToggle" type="checkbox" />
              みつめて<ruby>参加<rt>さんか</rt></ruby>
            </label>
            <label>
              みつめる<ruby>時間<rt>じかん</rt></ruby>（<ruby>秒<rt>びょう</rt></ruby>）
              <input id="gazeHoldInput" type="number" min="0.5" max="3" step="0.1" value="1.2" />
            </label>
            <label>
              みつめて<ruby>再検知<rt>さいけんち</rt></ruby>（<ruby>秒<rt>びょう</rt></ruby>）
              <input id="gazeCooldownInput" type="number" min="1" max="8" step="0.5" value="3.5" />
            </label>
            <div class="camera-check">
              <video id="gazeVideo" playsinline muted hidden></video>
              <p id="gazeStatus">みつめて参加はオフです</p>
            </div>
            <label>
              あいさつの<ruby>言葉<rt>ことば</rt></ruby>
              <select id="greetingModeSelect">
                <option value="auto">時間で自動</option>
                <option value="ohayo">おはよう</option>
                <option value="konnichiwa">こんにちは</option>
                <option value="sayonara">さようなら</option>
                <option value="custom">指定する</option>
              </select>
            </label>
            <label id="customGreetingLabel" hidden>
              <ruby>指定<rt>してい</rt></ruby>する<ruby>言葉<rt>ことば</rt></ruby>
              <input id="customGreetingInput" type="text" value="おはよう" />
            </label>
          </div>
        </details>

        <div class="history">
          <div class="history-head">
            <h2><ruby>記録一覧<rt>きろくいちらん</rt></ruby></h2>
            <button id="clearHistoryButton" type="button"><ruby>履歴削除<rt>りれきさくじょ</rt></ruby></button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </aside>
    </main>

    <script src="./app.js?v=20260620-13"></script>
  </body>
</html>
